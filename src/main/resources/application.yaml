spring:
  application:
    name: acore-player-dashboard

  datasource:
    url: jdbc:mysql://localhost:3306/acore_characters
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect